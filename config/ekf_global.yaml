ekf_global_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true

    transform_time_offset: 0.0
    transform_timeout: 0.2

    print_diagnostics: true
    debug: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    publish_tf: true
    publish_acceleration: false

    # Odom locale venant de ton EKF local
    odom0: /odometry/filtered
    odom0_config: [
      false, false, false,
      false, false, false,
      true,  true,  false,
      false, false, true,
      false, false, false
    ]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # Odom GPS produite par navsat_transform_node
    odom1: /odometry/gps
    odom1_config: [
      true,  true,  false,
      false, false, false,
      false, false, false,
      false, false, false,
      false, false, false
    ]
    odom1_differential: false
    odom1_relative: false
    odom1_queue_size: 10

    # IMU
    imu0: /imu/raw
    imu0_config: [
      false, false, false,
      false, false, true,
      false, false, false,
      false, false, true,
      true,  true,  false
    ]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 10
    imu0_remove_gravitational_acceleration: true
